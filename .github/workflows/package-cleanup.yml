name: Clean up old container package versions

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:
    inputs:
      min_versions_to_keep:
        description: Number of package versions to keep
        required: false
        default: '10'

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete older GHCR package versions
        uses: actions/delete-package-versions@v5
        with:
          owner: ${{ github.repository_owner }}
          package-name: docker-dev
          package-type: container
          min-versions-to-keep: ${{ inputs.min_versions_to_keep || '10' }}
